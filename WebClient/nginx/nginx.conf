events {}

http {
  map $args $login_backend {
    default "frontend";
    "~*type=" "backend";
  }

  server {
    listen 80;

    location / {
      proxy_pass http://frontend:5173;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
      proxy_pass http://backend:8080;
    }

    location = /login {
      if ($login_backend = "backend") {
        proxy_pass http://backend:8080;
        break;
      }
      proxy_pass http://frontend:5173;
    }

    location = /login/check {
      proxy_pass http://backend:8080;
    }

    location = /login/verify {
      proxy_pass http://backend:8080;
    }

    location = /logout {
      proxy_pass http://backend:8080;
    }

    location = /auth/refresh {
      proxy_pass http://backend:8080;
    }
  }
}
